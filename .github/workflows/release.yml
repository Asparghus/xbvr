name: Build XBVR Binaries

on:
  # Trigger manually from the GitHub UI
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for this release (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write 

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.21.0' # Ensures the runner has Go installed

      - name: Build UI
        run: |
          cd ui
          yarn install --ignore-engines
          yarn build

      - name: Build Windows Binary (.exe)
        env:
          GOOS: windows
          GOARCH: amd64
        # Compiles the Go code into a Windows executable
        run: go build -ldflags="-s -w" -o xbvr-windows-amd64.exe

      - name: Build Linux Binary
        env:
          GOOS: linux
          GOARCH: amd64
        # Compiles the Go code into a Linux binary
        run: go build -ldflags="-s -w" -o xbvr-linux-amd64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: Release ${{ inputs.version }}
          # Attaches both binaries to the release page
          files: |
            xbvr-windows-amd64.exe
            xbvr-linux-amd64
          generate_release_notes: true
