name: Manual Release

on:
  # This allows you to trigger the workflow manually from the GitHub UI
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for this release (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    # Required permission for GitHub Actions to create a release on your page
    permissions:
      contents: write 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build UI
        run: |
          cd ui
          yarn install --ignore-engines
          yarn build

      - name: Package UI
        run: |
          # Zips the built UI so it can be attached to the release.
          # NOTE: Change 'build' to 'dist' if your framework outputs there.
          cd ui
          zip -r ../ui-bundle-${{ inputs.version }}.zip build/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: Release ${{ inputs.version }}
          files: ui-bundle-${{ inputs.version }}.zip
          generate_release_notes: true
